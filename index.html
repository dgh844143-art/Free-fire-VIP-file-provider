    <script>
        // नीचे के विज्ञापन ऑटो-जेनरेट करने के लिए ताकि कोड छोटा रहे
        var bottomContainer = document.getElementById('bottomAds');
        for(var i=0; i<10; i++) {
            var div = document.createElement('div');
            div.className = 'ad-slot';
            div.innerHTML = '<p style="color:#222;">LOADING AD slot '+(i+16)+'...</p>';
            // यहाँ आप अपनी असली स्क्रिप्ट भी इंजेक्ट कर सकते हैं
            bottomContainer.appendChild(div);
        }

        var currentStep = 1;
        var timeLeft = 30;
        var timerObj;

        function startTimer() {
            timeLeft = 30;
            document.getElementById("timer").style.display = "block";
            document.getElementById("nextBtn").style.display = "none";
            document.getElementById("stepDisplay").innerHTML = "STEP " + currentStep + " / 6";
            
            timerObj = setInterval(function() {
                timeLeft--;
                document.getElementById("timer").innerHTML = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerObj);
                    document.getElementById("timer").style.display = "none";
                    document.getElementById("nextBtn").style.display = "block";
                }
            }, 1000);
        }

        function moveNext() {
            // हाई रिवेन्यू डायरेक्ट लिंक
            window.open("https://www.highrevenuegate.com/ab123", "_blank");

            if (currentStep < 6) {
                currentStep++;
                startTimer(); 
                window.scrollTo(0,0); 
            } else {
                window.location.href = "YOUR_MEDIAFIRE_LINK_HERE";
            }
        }
        window.onload = startTimer;
    </script>
